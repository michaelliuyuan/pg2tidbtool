source:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: ""
  database: "mydb"
  schema: "public"
  sslmode: "disable"

target:
  host: "localhost"
  port: 4000
  user: "root"
  password: ""
  database: "mydb"
  pd_addr: "localhost:2379"

migration:
  parallel: 4
  batch_size: 100000
  temp_dir: "/tmp/pg2tidb"
  tables: []
  exclude_tables: []
  use_lightning: true
  on_error: "abort"
  checkpoint_dir: ".checkpoint"
  read_timeout: "30m"
  write_timeout: "30m"

compare:
  no_pk_strategy: "auto"           # auto / hash_group / aggregate / bucket
  no_pk_bucket_count: 100          # for bucket strategy
  no_pk_table_threshold: 1000000   # rows above this use aggregate/bucket in auto mode

logging:
  level: "info"
  format: "console"
  output: ""

web:
  enable: false
  port: 8080
  host: "0.0.0.0"
